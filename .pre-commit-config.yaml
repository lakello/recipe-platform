repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]

  # Secrets detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: package-lock\.json

  # Python — ruff lint + format (exclude auto-generated alembic migrations)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
        exclude: ^backend/alembic/versions/
      - id: ruff-format
        files: ^backend/
        exclude: ^backend/alembic/versions/

  # Alembic — no multiple heads
  - repo: local
    hooks:
      - id: alembic-single-head
        name: Alembic single head check
        language: python
        entry: python backend/scripts/check_alembic_heads.py
        pass_filenames: false
        files: ^backend/alembic/versions/

  # TypeScript — ESLint
  - repo: local
    hooks:
      - id: frontend-eslint
        name: ESLint (frontend)
        language: system
        entry: bash -c 'cd frontend && npm run lint'
        pass_filenames: false
        files: ^frontend/src/

  # Terraform — fmt check
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.94.0
    hooks:
      - id: terraform_fmt
        files: ^infra/terraform/
