version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: project_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: project_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project_backend
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+psycopg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - PORT=${BACKEND_PORT}
      - CORS_ORIGINS=["http://localhost"]
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_PHOTOS=${S3_BUCKET_PHOTOS}
      - S3_BUCKET_AVATARS=${S3_BUCKET_AVATARS}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND_URL=redis://:${REDIS_PASSWORD}@redis:6379/2
      - OPENSEARCH_URL=${OPENSEARCH_URL}
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: project_frontend
    ports:
      - "${FRONTEND_PORT}:80"
    environment:
      - BACKEND_URL=${BACKEND_URL}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app_network

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "celery -A app.celery_app worker --loglevel=info"
    container_name: project_worker
    environment:
      - DATABASE_URL=postgresql+psycopg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND_URL=redis://:${REDIS_PASSWORD}@redis:6379/2
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_PHOTOS=${S3_BUCKET_PHOTOS}
      - S3_BUCKET_AVATARS=${S3_BUCKET_AVATARS}
      - OPENSEARCH_URL=${OPENSEARCH_URL}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "celery -A app.celery_app beat --loglevel=info"
    container_name: project_beat
    environment:
      - DATABASE_URL=postgresql+psycopg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND_URL=redis://:${REDIS_PASSWORD}@redis:6379/2
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_PHOTOS=${S3_BUCKET_PHOTOS}
      - S3_BUCKET_AVATARS=${S3_BUCKET_AVATARS}
      - OPENSEARCH_URL=${OPENSEARCH_URL}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  minio-init:
    image: minio/mc:latest
    container_name: local_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local_minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};

      if ! mc ls local_minio/${S3_BUCKET_PHOTOS} > /dev/null 2>&1; then
        mc mb local_minio/${S3_BUCKET_PHOTOS};
        echo 'Бакет ${S3_BUCKET_PHOTOS} успешно создан.';
      else
        echo 'Бакет ${S3_BUCKET_PHOTOS} уже существует.';
      fi;

      mc anonymous set private local_minio/${S3_BUCKET_PHOTOS};

      if ! mc ls local_minio/${S3_BUCKET_AVATARS} > /dev/null 2>&1; then
        mc mb local_minio/${S3_BUCKET_AVATARS};
        echo 'Бакет ${S3_BUCKET_AVATARS} успешно создан.';
      else
        echo 'Бакет ${S3_BUCKET_AVATARS} уже существует.';
      fi;

      mc anonymous set download local_minio/${S3_BUCKET_AVATARS};

      echo 'Инициализация MinIO завершена.';
      exit 0;
      "
    networks:
      - app_network

  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: opensearch
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - plugins.security.disabled=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

volumes:
  pg_data:
    driver: local
  minio_data:
    driver: local
  opensearch_data:
    driver: local

networks:
  app_network:
    driver: bridge
